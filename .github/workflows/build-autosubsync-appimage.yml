name: Build AutoSubSync AppImage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container: python:3.10-slim-bullseye

    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y git wget curl build-essential libgl1-mesa-dev libxkbcommon-x11-0 \
          libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
          libxcb-xinerama0 libxcb-xinput0 libxcb-randr0 libxcb-shape0 binutils musl-tools

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build static alass
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup target add x86_64-unknown-linux-musl
          git clone --depth 1 https://github.com/kaegi/alass.git /tmp/alass-src
          cd /tmp/alass-src
          cargo build --release --target x86_64-unknown-linux-musl
          
          # Find resources folder relative to wherever checkout happened
          RES_DIR=$(find $GITHUB_WORKSPACE -type d -name "resources" | head -n 1)
          mkdir -p "$RES_DIR/alass-bin"
          cp target/x86_64-unknown-linux-musl/release/alass "$RES_DIR/alass-bin/alass" || cp target/x86_64-unknown-linux-musl/release/alass-cli "$RES_DIR/alass-bin/alass"
          chmod +x "$RES_DIR/alass-bin/alass"

      - name: Prepare ffmpeg
        run: |
          pip install --no-cache-dir static-ffmpeg
          RES_DIR=$(find $GITHUB_WORKSPACE -type d -name "resources" | head -n 1)
          mkdir -p "$RES_DIR/ffmpeg-bin"
          export DEST_PATH="$RES_DIR/ffmpeg-bin"
          python3 << 'EOF'
          import static_ffmpeg, shutil, os
          static_ffmpeg.add_paths()
          bin_dir = "/usr/local/lib/python3.10/site-packages/static_ffmpeg/bin/linux"
          dest = os.getenv("DEST_PATH")
          for f in ["ffmpeg", "ffprobe"]:
              src = os.path.join(bin_dir, f)
              if os.path.exists(src):
                  shutil.copy2(src, os.path.join(dest, f))
          EOF
          chmod +x "$RES_DIR/ffmpeg-bin/"*

      - name: Run PyInstaller
        run: |
          # 1. Find the exact file path for main.py
          MAIN_FILE=$(find $GITHUB_WORKSPACE -name "main.py" | head -n 1)
          # 2. Get the directory and filename
          MAIN_DIR=$(dirname "$MAIN_FILE")
          MAIN_NAME=$(basename "$MAIN_FILE")
          
          cd "$MAIN_DIR"
          pip install --no-cache-dir pyinstaller
          
          # Install requirements from the repo root if they exist
          REQ=$(find $GITHUB_WORKSPACE -name "requirements.txt" | head -n 1)
          if [ -n "$REQ" ]; then pip install -r "$REQ"; fi

          # 3. Run PyInstaller from inside the folder where main.py sits
          # This handles both the script location and the local 'resources' folder
          pyinstaller --noconfirm --onedir --windowed \
          --add-data "resources:resources" \
          "$MAIN_NAME" --name AutoSubSync

      - name: Create AppDir
        run: |
          # Find the dist folder PyInstaller just created
          DIST_DIR=$(find $GITHUB_WORKSPACE -type d -name "AutoSubSync" | grep "/dist/" | head -n 1)
          mkdir -p /tmp/AppDir
          cp -a "$DIST_DIR/." /tmp/AppDir/
          
          printf "[Desktop Entry]\nType=Application\nName=AutoSubSync\nExec=AutoSubSync\nIcon=autosubsync\nCategories=Utility;\n" > /tmp/AppDir/autosubsync.desktop
          touch /tmp/AppDir/autosubsync.png
          
          printf '#!/bin/sh\nHERE="$(dirname "$(readlink -f "${0}")")"\nexec "${HERE}/AutoSubSync" "$@"\n' > /tmp/AppDir/AppRun
          chmod +x /tmp/AppDir/AppRun

      - name: Package AppImage
        run: |
          cd /tmp
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          export ARCH=x86_64
          ./appimagetool --appimage-extract
          ./squashfs-root/AppRun /tmp/AppDir /tmp/AutoSubSync-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSubSync-Linux
          path: /tmp/AutoSubSync-x86_64.AppImage
