name: Build AutoSubSync AppImage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container: python:3.10-slim-bullseye

    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y git wget curl build-essential libgl1-mesa-dev libxkbcommon-x11-0 \
          libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
          libxcb-xinerama0 libxcb-xinput0 libxcb-randr0 libxcb-shape0 binutils musl-tools \
          pkg-config libssl-dev xz-utils file libglib2.0-0 libfuse2

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build static alass
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup target add x86_64-unknown-linux-musl
          git clone --depth 1 https://github.com/kaegi/alass.git /tmp/alass-src
          cd /tmp/alass-src
          cargo build --release --target x86_64-unknown-linux-musl
          cd $GITHUB_WORKSPACE
          mkdir -p src/main/resources/alass-bin
          ALASS_BIN=$(find /tmp/alass-src/target/x86_64-unknown-linux-musl/release/ -maxdepth 1 -type f -name "alass*" | head -n 1)
          if [ -f "$ALASS_BIN" ]; then
            cp "$ALASS_BIN" src/main/resources/alass-bin/alass
            chmod +x src/main/resources/alass-bin/alass
          else
            echo "Alass binary not found" && exit 1
          fi

      - name: Prepare ffmpeg
        run: |
          pip install --no-cache-dir static-ffmpeg
          mkdir -p src/main/resources/ffmpeg-bin
          export DEST_PATH="$GITHUB_WORKSPACE/src/main/resources/ffmpeg-bin"
          python3 -c "
          import os, shutil
          try:
              from static_ffmpeg import run as sfr
              bin_dir = os.path.join(os.path.dirname(sfr.__file__), 'bin', 'linux')
              dest = os.getenv('DEST_PATH')
              if os.path.exists(bin_dir):
                  for f in ['ffmpeg', 'ffprobe']:
                      src = os.path.join(bin_dir, f)
                      if os.path.exists(src):
                          shutil.copy2(src, os.path.join(dest, f))
          except Exception as e:
              print(f'Pip lookup failed: {e}')
          " || echo "Pip-based ffmpeg prep failed..."
          if [ ! -f "src/main/resources/ffmpeg-bin/ffmpeg" ]; then
            wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
            tar -xJf ffmpeg-release-amd64-static.tar.xz
            mv ffmpeg-*-amd64-static/ffmpeg src/main/resources/ffmpeg-bin/
            mv ffmpeg-*-amd64-static/ffprobe src/main/resources/ffmpeg-bin/
          fi
          chmod +x src/main/resources/ffmpeg-bin/*

      - name: Run PyInstaller
        run: |
          pip install --no-cache-dir pyinstaller
          cd src/main
          if [ -f "../../requirements.txt" ]; then pip install -r ../../requirements.txt; fi
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          # Added --collect-all for potential hidden dependencies
          pyinstaller --noconfirm --onedir --windowed \
          --add-data "resources:resources" \
          --name AutoSubSync \
          main.py

      - name: Create AppDir
        run: |
          rm -rf /tmp/AppDir
          mkdir -p /tmp/AppDir
          cp -a src/main/dist/AutoSubSync/. /tmp/AppDir/
          
          # Create Desktop Entry
          cat <<EOF > /tmp/AppDir/autosubsync.desktop
[Desktop Entry]
Type=Application
Name=AutoSubSync
Exec=AutoSubSync
Icon=autosubsync
Categories=Utility;
Terminal=false
EOF
          touch /tmp/AppDir/autosubsync.png
          
          # ENHANCED AppRun script
          cat <<'EOF' > /tmp/AppDir/AppRun
#!/bin/sh
# Get the location of the AppRun script
SELF=$(readlink -f "$0")
HERE=${SELF%/*}

# Set Library Path to include the AppImage internal libs
export LD_LIBRARY_PATH="${HERE}:${LD_LIBRARY_PATH}"
export PATH="${HERE}:${PATH}"

# Execute the actual binary
exec "${HERE}/AutoSubSync" "$@"
EOF
          chmod +x /tmp/AppDir/AppRun

      - name: Package AppImage
        run: |
          cd /tmp
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          sed -i 's|AI\x02|\x00\x00\x00|' appimagetool
          ./appimagetool --appimage-extract
          
          export ARCH=x86_64
          # Use --no-appimage-extract and ensure the output filename is correct
          ./squashfs-root/usr/bin/appimagetool --no-appimage-extract /tmp/AppDir /tmp/AutoSubSync-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSubSync-Linux
          path: /tmp/AutoSubSync-x86_64.AppImage
