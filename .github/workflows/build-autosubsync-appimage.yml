name: Build AutoSubSync AppImage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container: python:3.10-slim-bullseye

    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y git wget curl build-essential libgl1-mesa-dev libxkbcommon-x11-0 \
          libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
          libxcb-xinerama0 libxcb-xinput0 libxcb-randr0 libxcb-shape0 binutils musl-tools

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build static alass
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup target add x86_64-unknown-linux-musl
          git clone --depth 1 https://github.com/kaegi/alass.git /tmp/alass-src
          cd /tmp/alass-src
          cargo build --release --target x86_64-unknown-linux-musl
          
          cd $GITHUB_WORKSPACE
          mkdir -p src/main/resources/alass-bin
          cp /tmp/alass-src/target/x86_64-unknown-linux-musl/release/alass src/main/resources/alass-bin/alass || true
          chmod +x src/main/resources/alass-bin/alass

      - name: Prepare ffmpeg
        run: |
          pip install --no-cache-dir static-ffmpeg
          mkdir -p src/main/resources/ffmpeg-bin
          export DEST_PATH="$GITHUB_WORKSPACE/src/main/resources/ffmpeg-bin"
          python3 << 'EOF'
import static_ffmpeg, shutil, os
static_ffmpeg.add_paths()
# Note: Path may vary slightly based on environment; standardizing search
bin_dir = "/usr/local/lib/python3.10/site-packages/static_ffmpeg/bin/linux"
dest = os.getenv("DEST_PATH")
for f in ["ffmpeg", "ffprobe"]:
    src = os.path.join(bin_dir, f)
    if os.path.exists(src):
        shutil.copy2(src, os.path.join(dest, f))
EOF
          chmod +x "$DEST_PATH/"*

      - name: Run PyInstaller
        run: |
          pip install --no-cache-dir pyinstaller
          cd src/main
          if [ -f "../../requirements.txt" ]; then pip install -r ../../requirements.txt; fi
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

          # Build as onedir
          pyinstaller --noconfirm --onedir --windowed \
          --add-data "resources:resources" \
          --name AutoSubSync \
          main.py

      - name: Create AppDir
        run: |
          rm -rf /tmp/AppDir
          mkdir -p /tmp/AppDir
          
          # Copy the contents of the PyInstaller dist folder to AppDir root
          cp -a src/main/dist/AutoSubSync/. /tmp/AppDir/
          
          # Create Desktop Entry
          cat <<EOF > /tmp/AppDir/autosubsync.desktop
[Desktop Entry]
Type=Application
Name=AutoSubSync
Exec=AutoSubSync
Icon=autosubsync
Categories=Utility;
Terminal=false
EOF
          
          # Create a dummy icon (required by appimagetool)
          # In a real scenario, replace this with your actual .png icon
          touch /tmp/AppDir/autosubsync.png
          
          # Create the entry point script
          cat <<'EOF' > /tmp/AppDir/AppRun
#!/bin/sh
# Get the directory where AppRun is located
HERE="$(dirname "$(readlink -f "${0}")")"
# Execute the main PyInstaller binary
exec "${HERE}/AutoSubSync" "$@"
EOF
          chmod +x /tmp/AppDir/AppRun

      - name: Package AppImage
        run: |
          cd /tmp
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          
          # Extract appimagetool because FUSE doesn't work in Docker/Actions
          ./appimagetool --appimage-extract
          
          # Build the AppImage
          export ARCH=x86_64
          ./squashfs-root/AppRun /tmp/AppDir /tmp/AutoSubSync-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSubSync-Linux
          path: /tmp/AutoSubSync-x86_64.AppImage
