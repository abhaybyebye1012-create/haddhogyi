# ─────────────────────────────────────────────────────────────────────────────
#  AutoSubSync AppImage builder — compatible with glibc 2.28 (Debian Buster)
# ─────────────────────────────────────────────────────────────────────────────

name: Build AutoSubSync AppImage (glibc 2.28 compatible)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build inside Debian Buster (glibc 2.28)
    runs-on: ubuntu-latest
    container:
      image: python:3.10-slim-buster

    steps:
      # ── 1. Install system libraries ─────────────────────────────────────────
      - name: Install system dependencies
        run: |
          echo "deb http://archive.debian.org/debian/ buster main" > /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list
          apt-get -o Acquire::Check-Valid-Until=false update -q
          apt-get install -y --no-install-recommends \
            wget curl git ca-certificates xz-utils file \
            binutils patchelf gcc g++ make musl-tools \
            python3-dev libdbus-1-dev \
            libglib2.0-0 libglib2.0-dev \
            libx11-6 libxcb1 libxcb-util0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 \
            libxext6 libxrender1 libxkbcommon0 libxkbcommon-x11-0 \
            libfontconfig1 libfreetype6 libdbus-1-3 \
            libgl1-mesa-glx libgles2-mesa libglx0 \
            libxi6 libxcursor1 libxcomposite1 libxtst6 \
            libasound2 libnss3 libpulse0 \
            squashfs-tools upx-ucl pkg-config zip unzip
          echo "System deps installed OK"

      # ── 2. Upgrade pip and install Python build tools ────────────────────────
      - name: Upgrade pip and install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Install PyQt6-builder and sip which help with metadata generation
          pip install "PyQt6-builder" "sip"
          pip install "pyinstaller>=6.0,<7.0"

      # ── 3. Clone AutoSubSync source ──────────────────────────────────────────
      - name: Clone AutoSubSync
        run: |
          git clone --depth 1 https://github.com/denizsafak/AutoSubSync.git /build/src

      # ── 4. Install all Python dependencies ──────────────────────────────────
      - name: Install Python dependencies
        run: |
          cd /build/src
          
          # Fix: Install a specific version of PyQt6 that works better with Buster
          # We install it separately first so the metadata generation doesn't fail later
          pip install "PyQt6==6.4.0" "PyQt6-Qt6==6.4.0" "PyQt6-sip"

          # Install remaining project deps
          pip install -e "." || true

          # Individual install for safety
          pip install \
            "ffsubsync" "autosubsync" "static-ffmpeg" \
            "rich" "requests" "psutil" "platformdirs" \
            "chardet" "charset-normalizer" "faust-cchardet" || true

          echo "=== Verification ==="
          python -c "import PyQt6.QtCore; print('PyQt6 version:', PyQt6.QtCore.PYQT_VERSION_STR)"

      # ── 5. Get ffmpeg + ffprobe ─────────────────────────────────────────────
      - name: Prepare ffmpeg binaries
        run: |
          mkdir -p /build/src/main/resources/ffmpeg-bin
          python << 'PYEOF'
          import static_ffmpeg
          import shutil, os
          ffmpeg_path, ffprobe_path = static_ffmpeg.add_paths()
          dest = "/build/src/main/resources/ffmpeg-bin"
          shutil.copy2(ffmpeg_path,  os.path.join(dest, "ffmpeg"))
          shutil.copy2(ffprobe_path, os.path.join(dest, "ffprobe"))
          os.chmod(os.path.join(dest, "ffmpeg"),  0o755)
          os.chmod(os.path.join(dest, "ffprobe"), 0o755)
          PYEOF

      # ── 6. Build alass (musl-static) ────────────────────────────────────────
      - name: Build alass (musl-static binary)
        run: |
          mkdir -p /build/src/main/resources/alass-bin
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup target add x86_64-unknown-linux-musl
          git clone --depth 1 https://github.com/kaegi/alass.git /build/alass-src
          cd /build/alass-src/alass-cli
          cargo build --release --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/alass-cli /build/src/main/resources/alass-bin/alass
          chmod +x /build/src/main/resources/alass-bin/alass

      # ── 7. Prepare autosubsync binary ───────────────────────────────────────
      - name: Prepare autosubsync binary
        run: |
          mkdir -p /build/src/main/resources/autosubsync
          AUTOSUBSYNC_SCRIPT=$(which autosubsync 2>/dev/null || python -c "import sysconfig; print(sysconfig.get_path('scripts'))")/autosubsync
          if [ -f "$AUTOSUBSYNC_SCRIPT" ]; then
            cp "$AUTOSUBSYNC_SCRIPT" /build/src/main/resources/autosubsync/autosubsync
          else
            python -c "import os; f=open('/build/src/main/resources/autosubsync/autosubsync','w'); f.write('#!/usr/bin/env python3\nfrom autosubsync.main import main\nif __name__==\"__main__\": import sys; sys.exit(main())'); f.close()"
          fi
          chmod +x /build/src/main/resources/autosubsync/autosubsync

      # ── 8. Build with PyInstaller ───────────────────────────────────────────
      - name: Build with PyInstaller
        run: |
          cd /build/src
          pyinstaller build.spec --noconfirm

      # ── 9. Locate dist directory ────────────────────────────────────────────
      - name: Find PyInstaller dist directory
        run: |
          DIST_DIR=$(find /build/src/dist -maxdepth 1 -type d ! -path /build/src/dist | head -1)
          echo "DIST_DIR=$DIST_DIR" >> $GITHUB_ENV

      # ── 10. Create AppDir ───────────────────────────────────────────────────
      - name: Create AppDir
        run: |
          rm -rf /build/AppDir && mkdir -p /build/AppDir
          cp -a "$DIST_DIR"/. /build/AppDir/
          wget -q "https://raw.githubusercontent.com/denizsafak/AutoSubSync/main/images/AutoSubSync1.png" -O /build/AppDir/autosubsync.png || true
          
          cat > /build/AppDir/autosubsync.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=AutoSubSync
          Exec=AutoSubSync
          Icon=autosubsync
          Categories=AudioVideo;Video;
          Terminal=false
          EOF

          cat > /build/AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${BASH_SOURCE[0]:-$0}")")"
          INTERNAL="$HERE/_internal"
          [ -d "$INTERNAL" ] || INTERNAL="$HERE"
          export PATH="$INTERNAL/resources/ffmpeg-bin:$INTERNAL/resources/alass-bin:$INTERNAL:$HERE:$PATH"
          export LD_LIBRARY_PATH="$INTERNAL:$HERE:${LD_LIBRARY_PATH:-}"
          for QT_PLUGINS in "$INTERNAL/PyQt6/Qt6/plugins" "$INTERNAL/PyQt6_Qt6/Qt6/plugins"; do
            if [ -d "$QT_PLUGINS/platforms" ]; then export QT_PLUGIN_PATH="$QT_PLUGINS"; break; fi
          done
          exec "$HERE/AutoSubSync" "$@"
          APPRUN
          chmod +x /build/AppDir/AppRun

      # ── 11. Package as AppImage ─────────────────────────────────────────────
      - name: Create AppImage
        run: |
          cd /build
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool --appimage-extract
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./squashfs-root/AppRun /build/AppDir /build/AutoSubSync-linux-amd64.AppImage

      # ── 12. Upload Artifact ──────────────────────────────────────────────────
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: AutoSubSync-AppImage-glibc228
          path: /build/AutoSubSync-linux-amd64.AppImage
