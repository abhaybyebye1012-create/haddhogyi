name: Build AutoSubSync AppImage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container: python:3.10-slim-bullseye

    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y git wget curl build-essential libgl1-mesa-dev libxkbcommon-x11-0 \
          libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
          libxcb-xinerama0 libxcb-xinput0 libxcb-randr0 libxcb-shape0 binutils musl-tools

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Python Dependencies
        run: |
          pip install --no-cache-dir pyinstaller static-ffmpeg
          REQ_PATH=$(find . -name "requirements.txt" | head -n 1)
          if [ -n "$REQ_PATH" ]; then
            pip install --no-cache-dir -r "$REQ_PATH"
          fi

      - name: Build static alass
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup target add x86_64-unknown-linux-musl
          git clone --depth 1 https://github.com/kaegi/alass.git /tmp/alass-src
          cd /tmp/alass-src
          cargo build --release --target x86_64-unknown-linux-musl
          
          ALASS_BIN=$(find target/x86_64-unknown-linux-musl/release/ -maxdepth 1 -type f -executable | head -n 1)
          # Hard-coded relative path target
          mkdir -p "${{ github.workspace }}/src/main/resources/alass-bin"
          cp "$ALASS_BIN" "${{ github.workspace }}/src/main/resources/alass-bin/alass"
          chmod +x "${{ github.workspace }}/src/main/resources/alass-bin/alass"

      - name: Prepare ffmpeg
        run: |
          # Create the directory explicitly using the workspace variable
          DEST="${{ github.workspace }}/src/main/resources/ffmpeg-bin"
          mkdir -p "$DEST"
          export DEST_PATH="$DEST"
          python3 << 'EOF'
          import static_ffmpeg, shutil, os, sys
          static_ffmpeg.add_paths()
          # This triggers the download if not present
          bin_dir = "/usr/local/lib/python3.10/site-packages/static_ffmpeg/bin/linux"
          dest = os.getenv("DEST_PATH")
          print(f"Copying FFmpeg from {bin_dir} to {dest}")
          for f in ["ffmpeg", "ffprobe"]:
              src = os.path.join(bin_dir, f)
              if os.path.exists(src):
                  shutil.copy2(src, os.path.join(dest, f))
                  print(f"Successfully copied {f}")
              else:
                  print(f"Warning: {f} not found in {bin_dir}")
          EOF
          chmod +x "$DEST/"*

      - name: Run PyInstaller
        run: |
          # Move to the src directory where main.py and resources live
          cd "${{ github.workspace }}/src"
          
          pyinstaller --noconfirm --onedir --windowed \
          --add-data "main/resources:resources" \
          main/main.py --name AutoSubSync

      - name: Create AppDir
        run: |
          # Locate the dist folder
          DIST_DIR="${{ github.workspace }}/src/dist/AutoSubSync"
          mkdir -p /tmp/AppDir
          cp -a "$DIST_DIR"/. /tmp/AppDir/
          
          printf "[Desktop Entry]\nType=Application\nName=AutoSubSync\nExec=AutoSubSync\nIcon=autosubsync\nCategories=Utility;\n" > /tmp/AppDir/autosubsync.desktop
          touch /tmp/AppDir/autosubsync.png
          
          printf '#!/bin/sh\nHERE="$(dirname "$(readlink -f "${0}")")"\nexec "${HERE}/AutoSubSync" "$@"\n' > /tmp/AppDir/AppRun
          chmod +x /tmp/AppDir/AppRun

      - name: Package AppImage
        run: |
          cd /tmp
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          export ARCH=x86_64
          ./appimagetool --appimage-extract
          ./squashfs-root/AppRun /tmp/AppDir /tmp/AutoSubSync-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSubSync-Linux
          path: /tmp/AutoSubSync-x86_64.AppImage
